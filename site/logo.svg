<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#07070c"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eabb"/>
      <stop offset="100%" stop-color="#00a88a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
  </g>

  <!-- Outer shield -->
  <path d="M200 60 L320 120 L320 240 C320 300 270 350 200 370 C130 350 80 300 80 240 L80 120 Z"
        fill="none" stroke="url(#shield)" stroke-width="3" opacity="0.3" filter="url(#glow)"/>

  <!-- Inner shield -->
  <path d="M200 90 L295 138 L295 232 C295 280 255 322 200 340 C145 322 105 280 105 232 L105 138 Z"
        fill="none" stroke="url(#shield)" stroke-width="4" filter="url(#glow)"/>

  <!-- Hexagon center -->
  <path d="M200 150 L240 170 L240 210 L200 230 L160 210 L160 170 Z"
        fill="none" stroke="#00d4aa" stroke-width="3"/>

  <!-- Center dot -->
  <circle cx="200" cy="190" r="8" fill="#00d4aa" filter="url(#glow)"/>

  <!-- Connection lines from center -->
  <g stroke="#00d4aa" stroke-width="1.5" opacity="0.4">
    <line x1="200" y1="150" x2="200" y2="110"/>
    <line x1="240" y1="170" x2="270" y2="152"/>
    <line x1="240" y1="210" x2="270" y2="228"/>
    <line x1="200" y1="230" x2="200" y2="270"/>
    <line x1="160" y1="210" x2="130" y2="228"/>
    <line x1="160" y1="170" x2="130" y2="152"/>
  </g>

  <!-- Node dots -->
  <g fill="#00d4aa" opacity="0.6">
    <circle cx="200" cy="110" r="3"/>
    <circle cx="270" cy="152" r="3"/>
    <circle cx="270" cy="228" r="3"/>
    <circle cx="200" cy="270" r="3"/>
    <circle cx="130" cy="228" r="3"/>
    <circle cx="130" cy="152" r="3"/>
  </g>
</svg>
